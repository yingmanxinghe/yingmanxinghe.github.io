---
layout: default
---

<article class="post">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
        <span>📅 {{ page.date | date: "%Y-%m-%d" }}</span>
        {% if page.categories %}
        <span>📂 分类：{{ page.categories | join: ", " }}</span>
        {% endif %}
        {% if page.tags %}
        <span>🏷️ 标签：{{ page.tags | join: ", " }}</span>
        {% endif %}
    </div>
    <div class="post-content">
        {{ content }}
    </div>
    {% include sidebar.html %}
</article>
